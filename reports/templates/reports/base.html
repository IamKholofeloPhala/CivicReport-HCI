<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicConnect | Billion Dollar Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --neon-blue: #00d2ff;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            transition: 0.5s ease;
        }
        .glass-card:hover {
            transform: scale(1.02);
            border-color: var(--neon-blue);
        }
        .navbar {
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass);
        }
        .btn-neon {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none; color: white; border-radius: 12px;
            padding: 15px; font-weight: 700; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-neon:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            color: white; transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark py-3 mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold animate__animated animate__fadeInLeft" href="/">
                <i class="fas fa-city text-info"></i> CIVIC<span class="text-info">CONNECT</span>
            </a>
            <div class="ms-auto">
                <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-4 me-2">New Report</a>
                <a href="/tracking/" class="btn btn-info btn-sm rounded-pill px-4 text-white">Live Tracking</a>
            </div>
        </div>
    </nav>

    <div class="container animate__animated animate__fadeIn">
        {% block content %} {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
